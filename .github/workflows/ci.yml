name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # P0 release gate: clean environment で pip install . が成功し、
      # 公開 API が import できること
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"
      - name: Import check
        run: python -c "from amygdala import MemoryRouter, Emotion"

      # unit / integration(mnemosyne 依存はインストール済みなので
      # contract test も実行される)
      - name: Test
        run: pytest -v
