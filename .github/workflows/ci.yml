name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # バックエンド非依存の検証: 追加依存ゼロで install / import できること、
  # かつ既定バックエンド(mnemosyne)が入っていないこと。
  backend-agnostic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install (no extras — stdlib only)
        run: |
          python -m pip install --upgrade pip
          pip install .
      - name: Import works without any backend
        run: python -c "from amygdala import MemoryRouter, Emotion, InMemoryCore, Core"
      - name: mnemosyne is NOT pulled in by default
        run: |
          python - <<'PY'
          import importlib.util, sys
          assert importlib.util.find_spec("mnemosyne") is None, \
              "mnemosyne must not be a hard dependency"
          print("ok: backend-agnostic install has no mnemosyne")
          PY

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # 既定バックエンド込みでインストールし、contract test まで実行する
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev,mnemosyne]"
      - name: Import check
        run: python -c "from amygdala import MemoryRouter, Emotion"

      # unit / integration / mnemosyne contract test
      - name: Test
        run: pytest -v
